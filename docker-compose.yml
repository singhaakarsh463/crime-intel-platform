version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: crimeintel-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crimeintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      POSTGRES_DB: ${POSTGRES_DB:-crime_intel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crimeintel -d crime_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crimeintel-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-crimeintel}:${POSTGRES_PASSWORD:-secret123}@db:5432/${POSTGRES_DB:-crime_intel}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-prod-secret-key-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      RATE_LIMIT_AUTH: 10/minute
      RATE_LIMIT_CHAT: 30/minute
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crimeintel-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
